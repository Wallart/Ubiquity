name: Build

on:
  push:
    tags: ['v*']       # vX.Y.Z → full build + GitHub Release
  workflow_dispatch:   # manual trigger from the Actions tab

jobs:
  # ------------------------------------------------------------------ #
  # macOS — .app bundle + .dmg                                          #
  # ------------------------------------------------------------------ #
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: Ubiquity-macOS
          path: dist/Ubiquity.dmg

  # ------------------------------------------------------------------ #
  # Windows — no-admin installer via Inno Setup                         #
  # ------------------------------------------------------------------ #
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build
        run: build.bat installer

      - uses: actions/upload-artifact@v4
        with:
          name: Ubiquity-Windows
          path: dist\UbiquitySetup.exe

  # ------------------------------------------------------------------ #
  # Linux — standalone binary (requires GTK + xclip on target system)   #
  # ------------------------------------------------------------------ #
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xclip \
            gir1.2-appindicator3-0.1 \
            gir1.2-gtk-3.0 \
            python3-gi

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: Ubiquity-Linux
          path: dist/ubiquity

  # ------------------------------------------------------------------ #
  # GitHub Release — attaches all three artifacts on tag push            #
  # ------------------------------------------------------------------ #
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Ubiquity-macOS/Ubiquity.dmg
            artifacts/Ubiquity-Windows/UbiquitySetup.exe
            artifacts/Ubiquity-Linux/ubiquity
